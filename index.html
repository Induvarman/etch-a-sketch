<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Etch a Sketch</title>
  <link rel="stylesheet" href="./styles/style.css">
  <link rel="shortcut icon" href="images/paint-logo.png" type="image/x-icon">
  <script defer src="./scripts/script.js"></script>
</head>
<body>
  <div class="header">
    <div class="logo">Etch a Sketch</div>
    <ul>
      <li><a href="https://github.com/Induvarman" target="_blank">GitHub</a></li>
      <li><a href="https://induvarman.github.io/rock-paper-scissors-game/index.html" target="_blank">RPS Project</a></li>
      <li><a href="https://github.com/Induvarman/etch-a-sketch" target="_blank">View Source</a></li>
    </ul>
  </div>
  
  <div class="content"> 
    <div class="input">
      <form>
        <p>
          <label for="order">Order (n):</label> 
          <input type="number" name="order" id="order" min="1" max="100"> <br>
        </p>
      </form> 
      <button id="rainbow-btn">Rainbow Mode</button>
      <button id="clear-btn">Clear Board</button>
    </div>
    <div class="grid">
    </div>
  </div>
  <div class="footer">
    <p>Copyrights ©2026 All rights reserved</p>
  </div>
</body>
</html>
